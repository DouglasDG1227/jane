server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Rota /admin (serve o index.html dentro da pasta /admin)
    location /admin {
        try_files $uri $uri/ /admin/index.html;
    }

    # Rota principal
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
    }
}
